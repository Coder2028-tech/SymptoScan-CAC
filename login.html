<!DOCTYPE html>
<html lang="en" class="bg-gray-50 h-full">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../static/Images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SymptoScan | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">

  <div class="bg-white p-10 rounded-lg shadow-lg max-w-md w-full">
    <h1 class="text-3xl font-semibold text-green-700 mb-6 text-center">Login</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="mb-6">
          {% for category, message in messages %}
            <li class="text-sm text-center
              {% if category == 'error' %}text-red-600{% elif category == 'success' %}text-green-600{% else %}text-gray-700{% endif %}">
              {{ message }}
            </li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
      <div>
        <label for="username" class="block font-medium text-gray-700 mb-1">Username</label>
        <input id="username" name="username" required
               class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>
      <div>
        <label for="password" class="block font-medium text-gray-700 mb-1">Password</label>
        <input id="password" name="password" type="password" required
               class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>
      <button type="submit" class="w-full bg-green-700 text-white rounded-lg py-3 font-semibold hover:bg-green-800 transition">
        Login
      </button>
    </form>
    <p class="mt-6 text-center text-gray-700">
  Don't have an account?
  <a href="{{ url_for('signup') }}" class="text-green-700 font-semibold hover:underline">Create one here</a>.
</p>

  </div>

</body>
</html>
